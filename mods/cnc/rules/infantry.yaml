		LocalOffset: 256,43,341
		FireDelay: 5
	Encyclopedia:
		Description: The rocket soldier is highly vulnerable but excels at eliminating enemy armor and air. It is the slowest unit in the game, being outrun by other infantry and even mammoth tanks. However, it makes up for its speed with extra range.\n\nThis unit is best used defensively, with something in front to soak damage and provide vision. 
		Order: 20
		Category: Units
	AttackFrontal:
		Voice: Attack
		FacingTolerance: 0
	AttackMove:
		Voice: Attack
	TakeCover:

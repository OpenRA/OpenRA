	Tooltip:
		Name: Grenadier
	UpdatesPlayerStatistics:
		AddToArmyValue: true
	Buildable:
		BuildPaletteOrder: 40
		Prerequisites: anyhq, ~techlevel.medium
		Queue: Infantry.GDI
		Description: Fast infantry armed with grenades. \n  Strong vs Buildings, slow-moving targets
	Mobile:
		Speed: 68

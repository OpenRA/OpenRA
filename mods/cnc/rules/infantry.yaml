		HP: 5000
	AutoTarget:
		ScanRadius: 4
	Armament:
		Weapon: Grenade
		LocalOffset: 0,0,427
		FireDelay: 15
	Encyclopedia:
		Description: The grenadier is fast and able to keep up with medium tanks, so it works great with flanking armies. However, it is not as strong as a minigunner or a rocket soldier, so make sure to use its speed to your advantage.
		Category: Units
	AttackFrontal:
		Voice: Attack
		FacingTolerance: 0
	AttackMove:
		Voice: Attack
	TakeCover:
		ProneOffset: 300,0,-227
	WithInfantryBody:
		DefaultAttackSequence: throw
	Explodes:
		Weapon: GrenadierExplode
		EmptyWeapon: GrenadierExplode
		Chance: 50


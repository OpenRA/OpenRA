	Buildable:
		BuildPaletteOrder: 50
		Prerequisites: tmpl, ~techlevel.high
		Queue: Infantry.Nod
		Description: Advanced general-purpose infantry.\n  Strong vs all Ground units
	Mobile:
		Speed: 54
		Locomotor: chem
	Health:
		HP: 9000
	AutoTarget:
		ScanRadius: 4
	Armament:
		Weapon: Chemspray
		LocalOffset: 341,0,256
		FireDelay: 3
		MuzzleSequence: muzzle
	Encyclopedia:
		Description: The chem warrior has similar stats to the flamethrower but deals good damage vs heavy armor. Great for stopping enemy armor from crushing your forces.\n\nCan walk on Tiberium without taking damage, which makes it great at harvester harassment on certain maps.
		Order: 40
		Category: Units
	AttackFrontal:

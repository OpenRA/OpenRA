PVICE:
	Inherits: ^Viceroid
	Buildable:
		Queue: Infantry.GDI, Infantry.Nod
		BuildPaletteOrder: 50
		Prerequisites: ~disabled
		Description: Mutated abomination that spits liquid Tiberium.\n  Strong vs Infantry, Buildings\n  Weak vs Aircraft
	Tooltip:
	UpdatesPlayerStatistics:
		AddToArmyValue: true
	ActorLostNotification:
		TextNotification: notification-unit-lost
	Encyclopedia:
		Description: The viceroid is a mutated lifeform created from the strange properties of Tiberium. Viceroids may be created from infantry units being exposed to Tiberium. They regenerate health quickly and have a short range Tiberium weapon.
		Order: 70
		Category: Units


E6:
	Inherits: ^Soldier
	Inherits@selection: ^SelectableSupportUnit
	Valued:
		Cost: 500
	Tooltip:
		Name: Engineer
	UpdatesPlayerStatistics:
		AddToArmyValue: true
	Buildable:
		BuildPaletteOrder: 30
		Prerequisites: barracks
		Queue: Infantry.GDI, Infantry.Nod
		Description: Damages and captures enemy structures.\n  Repairs destroyed vehicles\n  Unarmed
	Mobile:
		Speed: 46
	Health:
		HP: 3000
	Encyclopedia:
		Description: Like the rocket soldier, the engineer is slow and requires escorts to be used effectively. It can capture structures instantly but is consumed in the process. It requires only one engineer to capture a civilian structure. It requires two to capture an enemy structure, or one if the structure is heavily damaged.\n\nCan also be used to repair friendly structures or reclaim husks from destroyed vehicles.
		Order: 50
		Category: Units
	Passenger:
		CustomPipType: yellow
	InstantlyRepairs:
	RepairsBridges:
	CaptureManager:
	Captures@SABOTAGE:
		CaptureTypes: building-sabotage
		SabotageThreshold: 55
		PlayerExperience: 10
	Captures@CAPTURES:
		CaptureTypes: building
		PlayerExperience: 10
	Captures@CATURESHUSK:
		CaptureTypes: husk
		PlayerExperience: 10
		ValidRelationships: Enemy, Neutral, Ally
	-AttackFrontal:

